name: .editorconfig

# Validates .editorconfig against editorconfig.build on every push and PR.
# When drift is detected on a PR, posts a comment describing it.
#
# Default behaviour (fix-trigger: label):
#   Adding the "fix-editorconfig" label to the PR triggers the action to
#   automatically write and commit the correct .editorconfig.
#
# Alternative (fix-trigger: checkbox):
#   The comment will contain a checkbox. Ticking it triggers the fix on the
#   next run. To enable this, swap the on: block below and set fix-trigger: checkbox.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, labeled]
  # Uncomment to use the checkbox opt-in instead of labels:
  # issue_comment:
  #   types: [edited]

permissions:
  contents: write       # required to commit the fixed .editorconfig
  pull-requests: write  # required to post/update PR comments and remove labels

jobs:
  editorconfig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: artiomchi/editorconfig@v2
        with:
          token: your-project-token
          # Optional inputs (shown with their defaults):
          # tag: ''                         # pin to a published config version
          # auto-fix: 'false'               # set true to commit fixes automatically
          # fail-on-drift: 'true'           # set false to warn instead of failing
          # pr-comment: 'true'              # set false to suppress PR comments
          # fix-trigger: 'label'            # or 'checkbox'
          # fix-label: 'fix-editorconfig'   # label name for the label trigger
          # report-status: 'true'           # telemetry (gated by project config)
