name: Validate .editorconfig

# Runs as a status check on every PR and push to main.
# Fails if the repo's .editorconfig has drifted from your editorconfig.build project.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: artiomchi/editorconfig@main
        with:
          project-id: ab_i3khV1YbJdAZe
          token: CZOa8KicA7eH9_s8rLQmn7A1B-pS3KdEMvjgUSBjoVY
          # mode defaults to 'validate'
