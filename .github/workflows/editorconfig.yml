name: .editorconfig

# Validates .editorconfig against editorconfig.build on every push to main branch and PR.
# If drift is detected on a PR, posts a comment instructing how to fix it.
# Adding the "fix-editorconfig" label to the PR will have the action
# write and commit the correct .editorconfig automatically.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, labeled]

permissions:
  contents: write       # required to commit the fixed .editorconfig
  pull-requests: write  # required to post/update PR comments and remove labels

jobs:
  editorconfig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: artiomchi/editorconfig@main
        with:
          token: ${{ vars.EDITORCONFIG_TOKEN }}
