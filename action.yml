name: 'editorconfig.build'
description: 'Validate or sync your .editorconfig against your editorconfig.build project'

inputs:
  token:
    required: true
    description: 'Project token from editorconfig.build (found in project settings)'
  tag:
    required: false
    description: 'Version tag of the published configuration (defaults to latest)'
  path:
    required: false
    default: '.editorconfig'
    description: 'Path to the .editorconfig file in the repo'
  auto-fix:
    required: false
    default: 'false'
    description: 'If true, automatically write and commit the canonical .editorconfig when drift is detected'
  fail-on-drift:
    required: false
    default: 'true'
    description: 'If false, emit a warning instead of failing when drift is detected'
  pr-comment:
    required: false
    default: 'true'
    description: 'Whether to post (or update) a PR comment describing the drift and how to fix it'
  fix-trigger:
    required: false
    default: 'label'
    description: 'Opt-in mechanism when auto-fix is false: "label" (add fix-label to the PR) or "checkbox" (tick a checkbox in the comment)'
  fix-label:
    required: false
    default: 'fix-editorconfig'
    description: 'Label the action listens for when fix-trigger is "label"'
  report-status:
    required: false
    default: 'true'
    description: 'Whether to report sync status to editorconfig.build for telemetry/dashboard purposes (only if enabled on project)'
  github-token:
    required: false
    default: '${{ github.token }}'
    description: 'GitHub token — needs contents: write and pull-requests: write'

outputs:
  diff:
    description: 'Unified diff between remote and local configs (empty string if in sync)'
  in-sync:
    description: "'true' if configs match, 'false' if they differ"

runs:
  using: node20
  main: dist/index.js
